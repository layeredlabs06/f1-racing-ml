<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Racing ML 3D - Neural Network Evolution</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0e1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #c0d8f0;
    }
    #webgl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
    }
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }
    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(15, 20, 35, 0.9);
      border: 1px solid rgba(60, 130, 200, 0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: #c0d8f0;
      font-size: 13px;
      z-index: 100;
      min-width: 220px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #controls h3 {
      margin: 0 0 10px 0;
      color: #fff;
      font-size: 14px;
      border-bottom: 1px solid rgba(60, 130, 200, 0.25);
      padding-bottom: 6px;
    }
    .ctrl-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
    }
    .ctrl-row label { flex: 1; }
    .ctrl-row input[type="range"] {
      width: 90px;
      accent-color: #ff9030;
    }
    .ctrl-row input[type="number"] {
      width: 62px;
      background: rgba(30, 40, 60, 0.8);
      border: 1px solid rgba(60, 130, 200, 0.3);
      border-radius: 4px;
      color: #fff;
      padding: 3px 6px;
      text-align: center;
    }
    .ctrl-row input[type="checkbox"] { accent-color: #ff9030; }
    .ctrl-row select {
      background: rgba(30, 40, 60, 0.8);
      border: 1px solid rgba(60, 130, 200, 0.3);
      border-radius: 4px;
      color: #fff;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .ctrl-row .val {
      min-width: 32px;
      text-align: right;
      color: #ff9030;
      font-weight: bold;
    }
    #controls button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: rgba(255, 144, 48, 0.22);
      border: 1px solid rgba(255, 144, 48, 0.45);
      border-radius: 6px;
      color: #ff9030;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    #controls button:hover { background: rgba(255, 144, 48, 0.38); }
    #toggleBtn {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(15, 20, 35, 0.8);
      border: 1px solid rgba(60, 130, 200, 0.3);
      border-radius: 6px;
      color: #ff9030;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
      z-index: 99;
      display: none;
    }
    #legacyLink {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(150, 180, 220, 0.5);
      font-size: 11px;
      z-index: 50;
      text-decoration: none;
    }
    #legacyLink:hover { color: rgba(255, 144, 48, 0.9); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="webgl"></canvas>
  <canvas id="hud"></canvas>

  <div id="controls">
    <h3>Settings</h3>
    <div class="ctrl-row">
      <label>Track</label>
      <select id="trackSelect">
        <option value="Monaco">Monaco</option>
        <option value="Suzuka">Suzuka</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label>Cars</label>
      <input type="number" id="numCars" value="30" min="5" max="100" step="5">
    </div>
    <div class="ctrl-row">
      <label>Speed</label>
      <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1.0">
      <span class="val" id="speedVal">1.0x</span>
    </div>
    <div class="ctrl-row">
      <label>Mutation</label>
      <input type="range" id="mutation" min="0.05" max="1" step="0.05" value="0.3">
      <span class="val" id="mutVal">0.3</span>
    </div>
    <div class="ctrl-row">
      <label>Timeout</label>
      <input type="checkbox" id="useTimeout">
      <input type="number" id="timeout" value="1200" min="300" max="5000" step="100" style="width:55px">
    </div>
    <button id="applyBtn">Apply &amp; Restart</button>
    <button id="hideBtn">Hide</button>
  </div>
  <button id="toggleBtn">&#9881;</button>

  <a id="legacyLink" href="legacy-2d/">← 2D version</a>

  <script type="module" src="js/main.js?v=elev1"></script>
</body>
</html>
