<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Racing ML - Neural Network Evolution</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0e1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }

    #controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(15, 20, 35, 0.9);
      border: 1px solid rgba(60, 130, 200, 0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: #c0d8f0;
      font-size: 13px;
      z-index: 100;
      min-width: 200px;
      backdrop-filter: blur(8px);
    }
    #controls h3 {
      margin: 0 0 10px 0;
      color: #fff;
      font-size: 14px;
      border-bottom: 1px solid rgba(60,130,200,0.2);
      padding-bottom: 6px;
    }
    .ctrl-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
    }
    .ctrl-row label { flex: 1; }
    .ctrl-row input[type="range"] {
      width: 90px;
      accent-color: #ff9030;
    }
    .ctrl-row input[type="number"] {
      width: 60px;
      background: rgba(30,40,60,0.8);
      border: 1px solid rgba(60,130,200,0.3);
      border-radius: 4px;
      color: #fff;
      padding: 3px 6px;
      text-align: center;
    }
    .ctrl-row input[type="checkbox"] {
      accent-color: #ff9030;
    }
    .ctrl-row .val {
      min-width: 30px;
      text-align: right;
      color: #ff9030;
      font-weight: bold;
    }
    #controls button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: rgba(255, 144, 48, 0.2);
      border: 1px solid rgba(255, 144, 48, 0.4);
      border-radius: 6px;
      color: #ff9030;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    #controls button:hover {
      background: rgba(255, 144, 48, 0.35);
    }
    #toggle-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(15, 20, 35, 0.8);
      border: 1px solid rgba(60,130,200,0.3);
      border-radius: 6px;
      color: #ff9030;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
      z-index: 99;
      display: none;
    }
  </style>
</head>
<body>
  <div id="controls">
    <h3>Settings</h3>
    <div class="ctrl-row">
      <label>Cars</label>
      <input type="number" id="numCars" value="30" min="5" max="100" step="5">
    </div>
    <div class="ctrl-row">
      <label>Speed</label>
      <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1.0">
      <span class="val" id="speedVal">1.0x</span>
    </div>
    <div class="ctrl-row">
      <label>Mutation</label>
      <input type="range" id="mutation" min="0.05" max="1" step="0.05" value="0.3">
      <span class="val" id="mutVal">0.3</span>
    </div>
    <div class="ctrl-row">
      <label>Timeout</label>
      <input type="checkbox" id="useTimeout">
      <input type="number" id="timeout" value="1200" min="300" max="5000" step="100" style="width:55px">
    </div>
    <button onclick="applySettings()">Apply & Restart</button>
    <button onclick="document.getElementById('controls').style.display='none'; document.getElementById('toggle-btn').style.display='block'">Hide</button>
  </div>
  <button id="toggle-btn" onclick="document.getElementById('controls').style.display='block'; this.style.display='none'">⚙</button>

  <script>
    function applySettings() {
      NUM_CARS = parseInt(document.getElementById('numCars').value) || 30;
      SPEED_MULT = parseFloat(document.getElementById('speed').value) || 1.0;
      MUTATION_RATE = parseFloat(document.getElementById('mutation').value) || 0.3;
      USE_TIMEOUT = document.getElementById('useTimeout').checked;
      MAX_FRAMES = parseInt(document.getElementById('timeout').value) || 1200;
      // Reset
      generation = 1;
      allTimeBest = 0;
      cars = [];
      for (let i = 0; i < NUM_CARS; i++) cars.push(new Car());
      frameCounter = 0;
    }
    document.getElementById('speed').addEventListener('input', e => {
      document.getElementById('speedVal').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
    });
    document.getElementById('mutation').addEventListener('input', e => {
      document.getElementById('mutVal').textContent = parseFloat(e.target.value).toFixed(2);
    });
  </script>
  <script src="sketch.js?v=6"></script>
</body>
</html>
